<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflux Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header {
            padding: 15px 25px;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .back-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }

        .player-container { flex: 1; position: relative; background: #000; }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #status {
            padding: 5px 20px;
            font-size: 11px;
            color: #555;
            text-align: right;
            background: #000;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='index.html'">← Back</button>
    <div style="font-size: 14px; color: #aaa;">Theater Mode</div>
</div>

<div class="player-container">
    <iframe id="player" 
            allowfullscreen 
            sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<div id="status">Syncing playback...</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const type = params.get("type");
    const player = document.getElementById("player");
    const status = document.getElementById("status");

    const key = `progress_${type}_${id}`;
    let saved = localStorage.getItem(key) || 0;

    // Backend Logic
    if (type === "tv") {
        player.src = `https://www.vidking.net/embed/tv/${id}/1/1?color=e50914&nextEpisode=true&t=${saved}`;
    } else {
        player.src = `https://www.vidking.net/embed/movie/${id}?color=e50914&t=${saved}`;
    }

    // Progress Tracker
    window.addEventListener("message", e => {
        try {
            const data = JSON.parse(e.data);
            if (data.type === "PLAYER_PROGRESS") {
                localStorage.setItem(key, Math.floor(data.currentTime));
                status.innerText = "Last saved: " + Math.floor(data.currentTime) + "s";
            }
        } catch {}
    });
</script>
</body>
</html>
